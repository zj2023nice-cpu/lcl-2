version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: climberoot
      MYSQL_DATABASE: climbing_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: climberoot
      DB_DATABASE: climbing_db
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      CORS_ORIGIN: '*'
    depends_on:
      - mysql
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
